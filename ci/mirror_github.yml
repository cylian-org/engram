# Mirror - Push to GitHub on semver tags
# Requires GITHUB_TOKEN CI variable (PAT with Contents: Read and Write)

mirror:github:
  stage: release
  needs: []
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git clone "${CI_REPOSITORY_URL}" repo
    - cd repo
    - git checkout "${CI_COMMIT_TAG}"
    - rm -rf ci/ .gitlab-ci.yml
    - git add -A
    - git -c user.name="CI" -c user.email="ci@cylian.org" commit -m "Release ${CI_COMMIT_TAG}" --allow-empty
    - git tag -f "${CI_COMMIT_TAG}"
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/cylian-org/engram.git"
    - git push github HEAD:refs/heads/main --force
    - git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}" --force
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
