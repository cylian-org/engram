# Mirror - Push to GitHub on semver tags
# Requires GITHUB_TOKEN CI variable (PAT with Contents: Read and Write)

mirror:github:
  stage: release
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git clone --bare "${CI_REPOSITORY_URL}" repo.git
    - cd repo.git
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/cylian-org/engram.git"
    - git push github "refs/tags/${CI_COMMIT_TAG}:refs/tags/${CI_COMMIT_TAG}"
    - git push github "${CI_COMMIT_TAG}:refs/heads/main" --force
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
