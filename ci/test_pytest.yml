# Test - pytest unit and integration tests
# Requires python3-xapian (system package)

test:pytest:
  stage: test
  image: python:3.13-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3-xapian > /dev/null
    - pip install --quiet pytest==8.4.1
    - pip install --quiet -r src/requirements.txt
    - export PYTHONPATH=/usr/lib/python3/dist-packages:$PYTHONPATH
  script:
    - python -m pytest tests/ -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "devel"
