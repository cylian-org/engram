# Test - pytest unit and integration tests
# All backends tested (xapian via pip, sqlite stdlib, whoosh via pip)

test:pytest:
  stage: test
  image: python:3.13-slim
  before_script:
    - pip install --quiet pytest==8.4.1 coverage==7.8.0
    - pip install --quiet -r src/requirements.txt
  script:
    - coverage run -m pytest tests/ -v
    - coverage report --include="src/*" --fail-under=80
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "devel"
