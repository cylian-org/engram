# Analyse - Ruff linter for Python
# Checks code style and formatting

lint:ruff:
  stage: analyse
  image: python:3.11-slim
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check .
    - ruff format --check .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "devel"
