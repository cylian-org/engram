# Update Docker Hub description from README.md
# Triggered on main branch push

dockerhub:readme:
  stage: release
  needs: []
  image: python:3.13-alpine
  before_script:
    - apk add --no-cache curl
  script:
    - |
      # Get Docker Hub token
      TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login/" \
        -H "Content-Type: application/json" \
        -d "{\"username\":\"${DOCKER_HUB_USER}\",\"password\":\"${DOCKER_HUB_PASSWORD}\"}" \
        | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
      # Escape README for JSON
      BODY=$(python3 -c "import sys,json; print(json.dumps({'full_description': open('README.md').read()}))")
      # Update description
      curl -s -X PATCH "https://hub.docker.com/v2/repositories/cylian/engram/" \
        -H "Authorization: JWT ${TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${BODY}"
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
