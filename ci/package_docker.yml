# Package - Build once, push to both registries
# Triggered on main branch push (latest) and semver tags (versioned)

variables:
  DOCKER_IMAGE: cylian/engram

package:docker:
  stage: package
  image: docker:git
  services:
    - docker:dind
  script:
    # Build once
    - docker build --pull --tag engram:build .

    # Tag for GitLab Registry
    - docker tag engram:build "${CI_REGISTRY_IMAGE}:latest"
    - test -z "${CI_COMMIT_TAG}" || docker tag engram:build "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG#v}"

    # Tag for Docker Hub
    - docker tag engram:build "${DOCKER_IMAGE}:latest"
    - test -z "${CI_COMMIT_TAG}" || docker tag engram:build "${DOCKER_IMAGE}:${CI_COMMIT_TAG#v}"

    # Push to GitLab Registry
    - echo "${CI_REGISTRY_PASSWORD}" | docker login --username "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
    - docker push --all-tags "${CI_REGISTRY_IMAGE}"
    - docker logout "${CI_REGISTRY}"

    # Push to Docker Hub
    - echo "${DOCKER_HUB_PASSWORD}" | docker login --username "${DOCKER_HUB_USER}" --password-stdin
    - docker push --all-tags "${DOCKER_IMAGE}"
    - docker logout
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
