# Package - Build and push Docker image to registries
# Triggered on main branch push (latest) and semver tags (versioned)

variables:
  DOCKER_IMAGE: cylian/engram

### GitLab Container Registry (gitlab.cylian.org)
package:cylian.org:
  stage: package
  image: docker:git
  services:
    - docker:dind
  before_script:
    - echo "${CI_REGISTRY_PASSWORD}" | docker login --username "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"
  script:
    - docker build --pull --tag "${CI_REGISTRY_IMAGE}:latest" .
    - test -z "${CI_COMMIT_TAG}" || docker tag "${CI_REGISTRY_IMAGE}:latest" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - docker push --all-tags "${CI_REGISTRY_IMAGE}"
  after_script:
    - docker logout
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"

### Docker Hub (hub.docker.com)
package:docker.com:
  stage: package
  image: docker:git
  services:
    - docker:dind
  before_script:
    - echo "${DOCKER_HUB_PASSWORD}" | docker login --username "${DOCKER_HUB_USER}" --password-stdin
  script:
    - docker build --pull --tag "${DOCKER_IMAGE}:latest" .
    - test -z "${CI_COMMIT_TAG}" || docker tag "${DOCKER_IMAGE}:latest" "${DOCKER_IMAGE}:${CI_COMMIT_TAG}"
    - docker push --all-tags "${DOCKER_IMAGE}"
  after_script:
    - docker logout
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
