# GitLab CI/CD Pipeline for Engram
# Knowledge base MCP server with Xapian search

stages:
  - analyse
  - test
  - package
  - release

# Variables globales
variables:
  GIT_DEPTH: 10

# Includes locaux pour chaque stage
include:
  - local: 'ci/analyse_lint.yml'
  - local: 'ci/test_pytest.yml'
  - local: 'ci/package_docker.yml'
  - local: 'ci/release_tag.yml'
  - local: 'ci/mirror_github.yml'
  - local: 'ci/dockerhub_readme.yml'
